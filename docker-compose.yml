services:
  web:
    build: .
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_USER: ecomuser
      DB_PASSWORD: ecompassword
      DB_NAME: ecomdb
    depends_on:
      - db

  db:
    image: mariadb:11.8
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ecomdb
      MYSQL_USER: ecomuser
      MYSQL_PASSWORD: ecompassword
    volumes:
      - ./assets/db-load-script.sql:/docker-entrypoint-initdb.d/db-load-script.sql
      - db_data:/var/lib/mysql

volumes:
  db_data:
